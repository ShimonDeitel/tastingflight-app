<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tasting Flight - Whiskey Log</title>
<style>
  body { margin:0; background:#1A120B; color:#f2ede4; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
  h1 { font-size:2.4rem; color:#B5651D; margin-bottom:8px; }
  p.tagline { font-size:1.15rem; color:#c9c2b6; margin-bottom:40px; }
  .feature { background:#2C1810; border-radius:14px; padding:20px; margin-bottom:16px; text-align:left; }
  .feature h3 { margin:0 0 6px 0; color:#B5651D; }
  footer { margin-top:60px; font-size:0.85rem; color:#8a8378; }
  a { color:#B5651D; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #B5651D55 0%, #B5651D00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Tasting Flight</h1>
    <p class="tagline">Log whiskeys tasted with distillery and flavor notes.</p>
    <div class="feature">
      <h3>Free</h3>
      <p>Add whiskey with distillery, age, rating</p>
    </div>
    <div class="feature">
      <h3>Pro</h3>
      <p>Distillery stats, flavor tag cloud</p>
    </div>
    <footer>
      <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
      <p>Contact: s0533495227@gmail.com</p>
    </footer>
  </div>
</body>
</html>
